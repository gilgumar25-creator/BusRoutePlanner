<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario de Autobús - Urban Bus</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/header :: cabecera}"></div>

	<div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black" style="min-height: 100%;">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto">
				<div class="col-md-7 card shadow rounded-3 border-0 px-0 text-dark">

					<div class="card-header bg-dark text-white p-3 text-center">
						<h3 class="mb-0 fs-5 fw-bold d-flex align-items-center justify-content-center gap-2">
							<i class="bi bi-map-fill text-warning"></i>
							<span th:text="${bus.matricula != null} ? 'EDITAR AUTOBÚS' : 'NUEVO AUTOBÚS'">REGISTRO</span>
						</h3>
					</div>

					<div class="card-body p-4">
						<form th:action="@{/bus/guardarBus}" th:object="${bus}" method="POST">

							<div class="mb-4">
							    <label for="matricula" class="form-label fw-bold">Matrícula (Solo números)</label>
							    <input type="text" inputmode="numeric" pattern="[0-9]*" id="matricula"
							        th:field="*{matricula}" placeholder="Ej: 1234" 
							        th:readonly="${bus.matricula != null}" 
							        class="form-control"
							        th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid' : ''" />
							    <div th:replace="~{fragments/errors :: fieldError(campo='matricula')}"></div>
							</div>

							<div class="mb-4">
								<label for="capacidad" class="form-label fw-bold">Capacidad (Nº de Pasajeros)</label>
								<input type="number" id="capacidad" th:field="*{capacidad}"
									class="form-control" placeholder="Ej: 55" required />
							</div>

							<div class="mt-4 pt-3 border-top d-flex justify-content-between">
								<a th:href="@{/bus/listaBuses}" class="btn btn-light border">Cancelar</a>
								<button type="submit" class="btn btn-primary px-4 shadow-sm">
									<i class="bi bi-check-circle me-1"></i> Guardar Autobús
								</button>
							</div>

						</form>
					</div>

				</div>
			</div>
		</main>
	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
