<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Thymeleaf Expressions</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	
	<style>
		
	body{
		text-align: center;
		margin: 0 auto;
	}
	
	table{
		justify-content: center;
		text-align: center;
		align-items: center;
		border-collapse: collapse;
		border-color: black;
		width: 100%;
		margin:auto;
	}
	
	tr,th{
		margin-left: 20px;
	}
	th,td{
			margin-left: 20px;
			padding: 20px;
			border:1px solid brown;
	}
	</style>
</head>

<body>
	
	<h1>LISTA DE RUTAS</h1>
	<table>
		<thead>
			<tr>
				<th>Codigo</th>
				<th>Origen</th>
				<th>Destino</th>
				<th>NumeroMáximoBusesSimultáneos</th>
			</tr>
		</thead>

		<tbody>
			<tr th:each="route : ${routesList}">
				<td th:text="${route.codigo}">sin codigo</td>
				<td th:text="${route.origen}">sin origen</td>
				<td th:text="${route.destino}">sin destino</td>
				<td th:text="${route.numeroMaximoBusesSimultaneos}">Sin limite</td>

			</tr>
		</tbody>
	</table>
	
	

</body>

</html>
