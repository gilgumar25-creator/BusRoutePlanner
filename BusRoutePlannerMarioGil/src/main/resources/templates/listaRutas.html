<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Lista de Rutas</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
	<div th:replace="~{fragments/header :: cabecera}"></div>
	<div class="container-fluid mt-5">
		<div class="card shadow">
			<div class="card-header bg-dark text-white d-flex align-items-center">
				<div class="col-2"></div>

				<h1 class="h4 mb-0 flex-grow-1 text-center">LISTA DE RUTAS</h1>

				<div class="col-2 text-end">
					<button class="btn btn-success btn-sm">Añadir</button>
				</div>
			</div>
		</div>
		<div class="card-body p-0">
			<div class="table-responsive">
				<table class="table table-hover table-striped mb-0">
					<thead class="table-secondary">
						<tr>
							<th class="ps-4 col-2">Código</th>
							<th class="text-center col-3">Origen</th>
							<th class="text-center col-3">Destino</th>
							<th class="text-center col-3">NúmeroMáximoBusesSimultáneos</th>
							<th class="text-end pe-5 col">Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="route : ${routesList}">
							<td class="ps-4 align-items-center">
								<span class="text text-center fw-bold" th:text="${route.codigo}">sin codigo</span>
							</td>
							<td class="ps-4 align-items-center text-center">
								<span class="text text-center fw-bold" th:text="${route.origen}">sin codigo</span>
							</td>
							<td class="ps-4 align-items-center text-center">
								<span class="text text-center fw-bold" th:text="${route.destino}">sin codigo</span>
							</td>
							<td class="ps-4 align-items-center text-center">
								<span class="text text-center fw-bold" th:text="${route.codigo}">sin codigo</span>
							<td class="text-end pe-4">
								<button class="btn btn-sm btn-outline-primary">Editar</button>
								<button class="btn btn-sm btn-outline-danger">Eliminar</button>
							</td>
						</tr>
					</tbody>
				</table>


			</div>
		</div>
	</div>
	</div>
	<div th:replace="~{fragments/footer :: footer}"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
