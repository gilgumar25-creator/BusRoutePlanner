<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>¡Ups! Error en Autobús</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light d-flex align-items-center min-vh-100">

	<div class="container">
		<div class="row justify-content-center mx-2">
			<div class="col-md-7 col-lg-5">

				<div class="card rounded-4 border-0 shadow-lg overflow-hidden">

					<div class="card-header bg-danger bg-gradient text-white text-center py-3">
						<h5 class="mb-0 text-uppercase fw-bold tracking-wide" th:text="${errorTitulo}">
							Título del Error
						</h5>
					</div>

					<div class="card-body p-4 text-center">

						<div class="text-danger mb-3">
							<i class="bi bi-exclamation-triangle-fill display-1"></i>
						</div>

						<p class="text-dark fw-bold fs-5 px-2 mb-4" th:text="${errorMensaje}">
							Detalle explícito del problema ocurrido con el autobús.
						</p>

						<hr class="text-muted opacity-25 my-4">

						<div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
							<a th:href="@{/nuevoBus}" class="btn btn-danger btn-lg px-4 fw-semibold shadow-sm">
								Volver al formulario
							</a>
						</div>

					</div>

				</div>
			</div>
		</div>
	</div>
</body>

</html>
