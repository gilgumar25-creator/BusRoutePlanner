<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario de Planificación - BusRoute</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/header :: cabecera}"></div>

	<div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black" style="min-height: 100%;">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto">
				<div class="col-12 col-md-8 col-lg-6 card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden px-0">
					
					<div class="card-header bg-dark border-secondary p-3 text-center">
						<h1 class="h5 mb-0 fw-bold text-white text-uppercase tracking-wide d-flex align-items-center justify-content-center gap-2">
							<i class="bi bi-map-fill text-warning"></i>
							<span th:text="${planificacion.codigo != null} ? 'EDITAR PLANIFICACIÓN' : 'NUEVA PLANIFICACIÓN'">REGISTRO</span>
						</h1>
					</div>

					<div class="card-body p-4 text-light">
						<form th:action="@{/planificacionRuta/guardarPlanificacionRuta}" th:object="${planificacion}" method="post">
							<input type="hidden" th:field="*{codigo}" />

							<div class="row">
								<div class="col-md-6 mb-4">
									<label for="diaSemana" class="form-label fw-semibold text-warning small text-uppercase">Fecha de Servicio</label>
									<input type="date" id="diaSemana" th:field="*{diaSemana}"
										   class="form-control bg-white border-secondary text-dark fw-medium"
										   th:classappend="${#fields.hasErrors('diaSemana')} ? 'is-invalid' : ''">
									<div th:replace="~{fragments/errors :: fieldError(campo='diaSemana')}"></div>
								</div>

								<div class="col-md-6 mb-4">
									<label for="horario" class="form-label fw-semibold text-warning small text-uppercase">Turno / Horario</label>
									<select id="horario" th:field="*{horario}" 
											class="form-select bg-white border-secondary text-dark fw-medium"
											th:classappend="${#fields.hasErrors('horario')} ? 'is-invalid' : ''">
										<option value="MANANA" class="text-dark">Mañana</option>
										<option value="TARDE" class="text-dark">Tarde</option>
									</select>
									<div th:replace="~{fragments/errors :: fieldError(campo='horario')}"></div>
								</div>
							</div>

							<hr class="border-secondary border-opacity-50 my-3">

							<div class="mb-4">
								<label for="route" class="form-label fw-semibold text-warning small text-uppercase">Asignar Ruta</label>
								<select id="route" th:field="*{route.codigo}" 
										class="form-select bg-white border-secondary text-dark fw-medium"
										th:classappend="${#fields.hasErrors('route.codigo')} ? 'is-invalid' : ''">
									<option value="" hidden class="text-secondary">Selecciona ruta...</option>
									<option th:each="r : ${rutas}" 
											th:value="${r.codigo}" 
											th:text="${r.codigo + ' (' + r.origen + ' ➔ ' + r.destino + ')'}"
											class="text-dark">
									</option>
								</select>
								<div th:replace="~{fragments/errors :: fieldError(campo='route.codigo')}"></div>
							</div>

							<div class="row">
								<div class="col-md-6 mb-4">
									<label for="bus" class="form-label fw-semibold text-warning small text-uppercase">Asignar Bus</label>
									<select id="bus" th:field="*{bus.matricula}" 
											class="form-select bg-white border-secondary text-dark fw-medium"
											th:classappend="${#fields.hasErrors('bus.matricula')} ? 'is-invalid' : ''">
										<option value="" hidden class="text-secondary">Selecciona bus...</option>
										<option th:each="b : ${buses}" 
												th:value="${b.matricula}" 
												th:text="${b.matricula + ' (' + b.capacidad + ' plazas)'}"
												class="text-dark">
										</option>
									</select>
									<div th:replace="~{fragments/errors :: fieldError(campo='bus.matricula')}"></div>
								</div>

								<div class="col-md-6 mb-4">
									<label for="driver" class="form-label fw-semibold text-warning small text-uppercase">Asignar Conductor</label>
									<select id="driver" th:field="*{driver.licencia}" 
											class="form-select bg-white border-secondary text-dark fw-medium"
											th:classappend="${#fields.hasErrors('driver.licencia')} ? 'is-invalid' : ''">
										<option value="" hidden class="text-secondary">Selecciona conductor...</option>
										<option th:each="d : ${conductores}" 
												th:value="${d.licencia}" 
												th:text="${d.nombre}"
												class="text-dark">
										</option>
									</select>
									<div th:replace="~{fragments/errors :: fieldError(campo='driver.licencia')}"></div>
								</div>
							</div>

							<div class="mt-4 pt-3 border-top border-secondary border-opacity-30 d-flex justify-content-between">
								<a th:href="@{/planificacionRuta}" class="btn btn-sm btn-outline-light px-3 py-2 rounded-2">
									Cancelar
								</a>
								<button type="submit" class="btn btn-sm btn-warning text-dark fw-bold px-4 py-2 rounded-2 shadow-sm">
									<i class="bi bi-check-circle me-1"></i> Guardar Planificación
								</button>
							</div>

						</form>
					</div>

				</div> 
			</div>
		</main>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
