<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Planificación - BusRoute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/header :: cabecera}"></div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7"> <div class="card shadow rounded-3 border-0">
                    
				<div class="card-header bg-dark text-white p-3 text-center">
				    <h3 class="mb-0 fs-5 fw-bold d-flex align-items-center justify-content-center gap-2">
				        <i class="bi bi-map-fill text-warning"></i>
				        <span th:text="${planificacion.codigo != null} ? 'EDITAR PLANIFICACIÓN' : 'NUEVA PLANIFICACIÓN'">REGISTRO</span>
				    </h3>
				</div>

                    <div class="card-body p-4">
                        <form th:action="@{/planificacionRuta/guardarPlanificacionRuta}" th:object="${planificacion}" method="post">
                            <input type="hidden" th:field="*{codigo}" />

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="diaSemana2" class="form-label fw-bold">Fecha de Servicio</label>
                                    <input type="date" id="diaSemana2" th:field="*{diaSemana2}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('diaSemana2')} ? 'is-invalid' : ''">
                                    <div th:replace="~{fragments/errors :: fieldError(campo='diaSemana2')}"></div>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="horario" class="form-label fw-bold">Turno / Horario</label>
                                    <select id="horario" th:field="*{horario}" 
                                            class="form-select"
                                            th:classappend="${#fields.hasErrors('horario')} ? 'is-invalid' : ''">
                                        <option value="MANANA">Mañana</option>
                                        <option value="TARDE">Tarde</option>
                                    </select>
                                    <div th:replace="~{fragments/errors :: fieldError(campo='horario')}"></div>
                                </div>
                            </div>

                            <hr class="my-3">

                            <div class="mb-4">
                                <label for="route" class="form-label fw-bold">ASIGNAR RUTA</label>
                                <select id="route" th:field="*{route.codigo}" 
                                        class="form-select"
                                        th:classappend="${#fields.hasErrors('route.codigo')} ? 'is-invalid' : ''">
                                    <option value="" hidden>Selecciona ruta...</option>
                                    <option th:each="r : ${rutas}" 
                                            th:value="${r.codigo}" 
                                            th:text="${r.codigo + ' (' + r.origen + ' ➔ ' + r.destino + ')'}">
                                    </option>
                                </select>
                                <div th:replace="~{fragments/errors :: fieldError(campo='route.codigo')}"></div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="bus" class="form-label fw-bold">ASIGNAR BUS</label>
                                    <select id="bus" th:field="*{bus.matricula}" 
                                            class="form-select"
                                            th:classappend="${#fields.hasErrors('bus.matricula')} ? 'is-invalid' : ''">
                                        <option value="" hidden>Selecciona bus...</option>
                                        <option th:each="b : ${buses}" 
                                                th:value="${b.matricula}" 
                                                th:text="${b.matricula + ' (' + b.capacidad + ' plazas)'}">
                                        </option>
                                    </select>
                                    <div th:replace="~{fragments/errors :: fieldError(campo='bus.matricula')}"></div>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="driver" class="form-label fw-bold">ASIGNAR CONDUCTOR</label>
                                    <select id="driver" th:field="*{driver.licencia}" 
                                            class="form-select"
                                            th:classappend="${#fields.hasErrors('driver.licencia')} ? 'is-invalid' : ''">
                                        <option value="" hidden>Selecciona conductor...</option>
                                        <option th:each="d : ${conductores}" 
                                                th:value="${d.licencia}" 
                                                th:text="${d.nombre}">
                                        </option>
                                    </select>
                                    <div th:replace="~{fragments/errors :: fieldError(campo='driver.licencia')}"></div>
                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                                <a th:href="@{/listaPlanificaciones}" class="btn btn-light border">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                    <i class="bi bi-check-circle me-1"></i> Guardar Planificación
                                </button>
                            </div>

                        </form>
                    </div>

                </div> </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
