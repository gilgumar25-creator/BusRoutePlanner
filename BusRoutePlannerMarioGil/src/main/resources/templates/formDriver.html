<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Conductor - Urban Bus</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/header :: cabecera}"></div>

    <div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black" style="min-height: 100%;">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto">
				<div class="col-md-6 card shadow-lg rounded-4 border-0 px-0 text-dark">
                    
                    <div class="card-header bg-dark text-warning p-4 text-center border-0">
                        <h3 class="mb-0 fs-4 fw-bold tracking-wide">
                            <i class="bi bi-person-vcard me-2"></i>
                            <span th:text="${driver.licencia != null} ? 'EDITAR CONDUCTOR' : 'NUEVO CONDUCTOR'">REGISTRO</span>
                        </h3>
                    </div>

                    <div class="card-body p-5">
                        <form th:action="@{/driver/guardarDriver/submit}" th:object="${driver}" method="post">

							<div class="mb-4">
							    <label for="licencia" class="form-label fw-bold text-secondary small text-uppercase">Número de Licencia</label>
							    <div class="input-group">
							        <span class="input-group-text bg-white border-end-0"><i class="bi bi-card-heading"></i></span>
							        <input type="number" step="1" id="licencia" th:field="*{licencia}" 
							               placeholder="Ej. 102030" th:readonly="${driver.licencia != null}"
							               class="form-control border-start-0 ps-0"
							               th:classappend="${#fields.hasErrors('licencia')} ? 'is-invalid' : ''">
							    </div>
							    <div th:replace="~{fragments/errors :: fieldError(campo='licencia')}"></div>
							</div>

                            <div class="mb-4">
                                <label for="nombre" class="form-label fw-bold text-secondary small text-uppercase">Nombre Completo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-person"></i></span>
                                    <input type="text" id="nombre" th:field="*{nombre}" 
                                           placeholder="Nombre y Apellidos"
                                           class="form-control border-start-0 ps-0"
                                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''">
                                </div>
                                <div th:replace="~{fragments/errors :: fieldError(campo='nombre')}"></div>
                            </div>

							<div class="mb-4">
							    <label for="estado" class="form-label fw-bold text-secondary small text-uppercase">Estado del Conductor</label>
							    <div class="input-group">
							        <span class="input-group-text bg-white border-end-0">
							            <i class="bi bi-check-lg"></i>
							        </span>
							        
							        <select id="estado" th:field="*{estado}" 
							                class="form-control border-start-0 ps-0 form-select"
							                th:classappend="${#fields.hasErrors('estado')} ? 'is-invalid' : ''">
							            <option th:value="true">Activo</option>
							            <option th:value="false">Inactivo</option>
							        </select>
							    </div>
							    <div th:replace="~{fragments/errors :: fieldError(campo='estado')}"></div>
							</div>

                            <div class="mt-5 d-flex gap-3">
                                <a th:href="@{/driver/listaDrivers}" class="btn btn-outline-secondary w-50 py-2 fw-bold">
                                    <i class="bi bi-x-circle me-2"></i>CANCELAR
                                </a>
                                <button type="submit" class="btn btn-dark text-warning w-50 py-2 fw-bold shadow-sm">
                                    <i class="bi bi-check-circle me-2"></i>GUARDAR
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
