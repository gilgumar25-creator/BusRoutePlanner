<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Ranking de Rutas - Urban Bus</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/header :: cabecera}"></div>

	<div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black" style="min-height: 100%;">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto">
				<div class="col-12 col-xl-10 card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden px-0">
					
					<div class="card-header bg-dark border-secondary p-3">
						<div class="row align-items-center g-3">
							
							<div class="col-md-3 d-none d-md-block"></div>
							
							<div class="col-12 col-md-6 text-center">
								<h1 class="h4 mb-0 fw-bold text-white text-uppercase tracking-wide" th:text="${titulo != null} ? ${titulo} : 'RANKING DE RUTAS'">RANKING DE RUTAS</h1>
							</div>
							
							<div class="col-12 col-md-3 text-center text-md-end">
								<a th:href="@{/planificacionRuta}" class="btn btn-warning text-dark btn-sm fw-bold px-3 py-2 d-inline-flex align-items-center gap-2 shadow-sm">
									<i class="bi bi-calendar3"></i> Ver Planificaciones
								</a>
							</div>
							
						</div>
					</div>

					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-dark table-hover align-middle mb-0">
								<thead class="table-group-divider text-uppercase small text-warning">
									<tr>
										<th class="py-3 ps-4 text-center fw-bold text-warning">Nº Veces</th>
										<th class="py-3 text-center fw-bold text-warning">Código</th>
										<th class="py-3 ps-5 text-start fw-bold text-warning">Origen</th>
										<th class="py-3 text-start fw-bold text-warning">Destino</th>
										<th class="py-3 text-center fw-bold text-warning">Distancia</th>
										<th class="py-3 text-center fw-bold text-warning">Precio / km</th>
										<th class="py-3 text-center pe-4 fw-bold text-warning">Precio Viaje</th>
										<th class="py-3 text-center fw-bold text-warning">Buses Máx.</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#lists.isEmpty(ranking)}">
										<td colspan="8" class="text-center py-5 text-muted">
											<i class="bi bi-exclamation-triangle d-block mb-2 text-warning fs-1"></i>
											<span class="fw-bold d-block text-white">No hay datos suficientes para el ranking</span>
											<small class="text-secondary">Asegúrate de que existan planificaciones con rutas vinculadas.</small>
										</td>
									</tr>
									<tr th:each="fila : ${ranking}">
										<td class="py-3 ps-4 text-center fw-bold text-warning fs-5">
											<span th:text="${fila[1]}">0</span>
										</td>
										<td class="py-3 text-center">
											<span class="badge bg-dark text-warning border border-secondary px-3 py-2 rounded-2 font-monospace fs-6" th:text="${fila[0].codigo}">100</span>
										</td>
										<td class="py-3 ps-5 text-start">
											<div class="ps-2 fw-bold text-white fs-5" th:text="${fila[0].origen}">Origen</div>
										</td>
										<td class="py-3 text-start">
											<div class="fw-bold text-white fs-5" th:text="${fila[0].destino}">Destino</div>
										</td>
										<td class="py-3 text-center text-white fs-5 fw-bold">
											<span th:text="${fila[0].distancia} + ' km'">0 km</span>
										</td>
										<td class="py-3 text-center text-white fw-bold">
											<span th:text="${#numbers.formatDecimal(fila[0].preciokilometro, 1, 2, 'COMMA')} + ' €/km'">0,00 €/km</span>
										</td>
										<td class="py-3 text-center pe-4 fs-5 fw-bold text-white">
											<span th:text="${#numbers.formatDecimal(fila[0].precioViaje, 1, 2, 'COMMA')} + ' €'">0,00 €</span>
										</td>
										<td class="py-3 text-center">
											<div class="text-white fs-5 fw-semibold" th:text="${fila[0].numeroMaximoBusesSimultaneos}">1</div>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>

		</main>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
