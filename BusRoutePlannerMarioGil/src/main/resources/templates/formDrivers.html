<!DOCTYPE html>

<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Formulario de Conductor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">


    <div th:replace="~{fragments/header :: cabecera}"></div>


    <div class="container mt-5 mb-5">

        <div class="row justify-content-center">

            <div class="col-md-6"> 

                <div class="card shadow rounded-3 border-0">

                    

                    <div class="card-header bg-dark text-white p-3 text-center">

                        <h3 class="mb-0 fs-5 fw-bold">

                            <span th:text="${driver.licencia != null} ? 'EDITAR CONDUCTOR' : 'NUEVO CONDUCTOR'">REGISTRO</span>

                        </h3>

                    </div>


                    <div class="card-body p-4">

                        <form th:action="@{/driver/guardarDriver/submit}" th:object="${driver}" method="post">


                            <div class="mb-4">

                                <label for="licencia" class="form-label fw-bold">Número de Licencia</label>

                                <input type="number" step="1" min="1" class="form-control" id="licencia" th:field="*{licencia}" 

                                       placeholder="Ej. 102030" th:readonly="${driver.licencia != null}" required>

                            </div>


                            <div class="mb-4">

                                <label for="nombre" class="form-label fw-bold">Nombre Completo</label>

                                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" 

                                       placeholder="Nombre y Apellidos" required>

                            </div>


                            <hr class="my-4">


                            <div class="mb-4">

                                <label class="form-label d-block fw-bold mb-2">Sexo</label>

                                <div class="form-check form-check-inline">

                                    <input class="form-check-input" type="radio" name="sexoTemp" id="sexoH" value="HOMBRE" required>

                                    <label class="form-check-label" for="sexoH">Hombre</label>

                                </div>

                                <div class="form-check form-check-inline">

                                    <input class="form-check-input" type="radio" name="sexoTemp" id="sexoM" value="MUJER">

                                    <label class="form-check-label" for="sexoM">Mujer</label>

                                </div>

                            </div>


                            <div class="mb-4">

                                <label class="form-label d-block fw-bold mb-3">Selecciona un Avatar</label>

                                <div class="d-flex gap-3 justify-content-start">

                                    

                                    <div class="form-check p-0 m-0">

                                        <input type="radio" class="btn-check" name="avatarTemp" id="av1" value="avatar1" required>

                                        <label class="btn btn-outline-secondary p-1 rounded-circle" for="av1">

                                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="rounded-circle" width="60" height="60" alt="Avatar 1">

                                        </label>

                                    </div>


                                    <div class="form-check p-0 m-0">

                                        <input type="radio" class="btn-check" name="avatarTemp" id="av2" value="avatar2">

                                        <label class="btn btn-outline-secondary p-1 rounded-circle" for="av2">

                                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="rounded-circle" width="60" height="60" alt="Avatar 2">

                                        </label>

                                    </div>


                                    <div class="form-check p-0 m-0">

                                        <input type="radio" class="btn-check" name="avatarTemp" id="av3" value="avatar3">

                                        <label class="btn btn-outline-secondary p-1 rounded-circle" for="av3">

                                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jace" class="rounded-circle" width="60" height="60" alt="Avatar 3">

                                        </label>

                                    </div>


                                </div>

                            </div>


                            <div class="mt-4 pt-3 border-top d-flex justify-content-between">

                                <a th:href="@{/driver/listaDrivers}" class="btn btn-light border">Cancelar</a>

                                <button type="submit" class="btn btn-primary px-4">Guardar</button>

                            </div>


                        </form>

                    </div>


                </div>

            </div>

        </div>

    </div>


    <div th:replace="~{fragments/footer :: footer}"></div>


</body>

</html>
