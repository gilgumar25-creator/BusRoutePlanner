<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Thymeleaf Expressions</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	<link rel="stylesheet" href="https://jsdelivr.net">

	
	<style>
	</style>
</head>

<body>
	
	<script src="js/validator.js" defer></script>
	<section class="py-4">
	            <fieldset class="border border-2 border-danger p-4 rounded-3 m-auto w-50 mt-4">
	                <legend class="float-none w-auto px-2 fs-5 fw-bold  ">Registro Usuario</legend>
	                <form class="container-fluid needs-validation" action="#" method="POST" th:action="@{/newRuta/submit}" th:object="${route}" id="formulario" novalidate>
	                    <div class="row g-3">
	                        <div class="col-md-6">
	                            <div class="input-group has-validation">
	                                <label class="input-group-text bg-muted text-dark" for="nombre">Nombre</label>
	                                <input type="text" class="form-control" name="nombre" id="nombre" maxlength="250"
	                                    required placeholder="Nombre">
	                                <div class="invalid-feedback">Por favor, ingresa tu nombre.</div>
	                            </div>
	                        </div>

	                        <div class="col-md-6">
	                            <div class="input-group has-validation">
	                                <label class="input-group-text bg-muted text-dark" for="apellido">Apellido</label>
	                                <input type="text" class="form-control" name="apellido" id="apellido" maxlength="250"
	                                    required placeholder="Apellido">
	                                <div class="invalid-feedback">Por favor, ingresa tu apellido.</div>
	                            </div>
	                        </div>

	                        <div class="col-md-6">
	                            <div class="input-group has-validation">
	                                <label class="input-group-text bg-muted text-dark" for="mail"><i class="bi bi-envelope-at">Email</i></label>
	                                <input type="email" class="form-control" name="mail" id="mail" maxlength="250" required
	                                    placeholder="correo@ejemplo.com">
	                                <div class="invalid-feedback">Ingresa un correo electrónico válido.</div>
	                                <div class="valid-feedback">Email válido</div>
	                            </div>
	                        </div>

	                        <div class="col-md-6">
	                            <div class="input-group has-validation">
	                                <label class="input-group-text bg-muted text-dark" for="passw">Contraseña</label>
	                                <input type="password" class="form-control" name="passw" id="passw" required
	                                    pattern="\d{4}" title="La contraseña debe tener exactamente 4 números">
	                                <div class="invalid-feedback">La contraseña deben de ser 4 dígitos numéricos</div>
	                                <div class="valid-feedback">Contraseña correcta</div>
	                            </div>
	                        </div>

	                        <div class="col-md-6">
	                            <label class="form-label" for="provincia">Provincia</label>
	                            <select class="form-select" id="provincia" name="provincia">
	                                <option selected disabled value="">Selecciona...</option>
	                                <option value="se">Sevilla</option>
	                                <option value="hu">Huelva</option>
	                                <option value="ca">Cádiz</option>
	                                <option value="ma">Málaga</option>
	                                <option value="ja">Jaén</option>
	                                <option value="gr">Granada</option>
	                                <option value="al">Almería</option>
	                                <option value="co">Córdoba</option>
	                            </select>
	                        </div>
	                    </div>

	                    <div class="mt-4">
	                        <button type="submit" class="btn btn-danger px-4">Enviar</button>
	                    </div>
	                </form>
	            </fieldset>
	        </section>
	
	
	
	
</body>

</html>
