<!doctype html>

<html lang="es" xmlns:th="http://www.thymeleaf.org">


<head>

	<meta charset="UTF-8">

	<title>Lista de Conductores</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<script src="js/validator.js" defer></script>

</head>


<body class="bg-light">

	<div th:replace="~{fragments/header :: cabecera}"></div>


	<div class="container-fluid mt-5">

		<div class="card shadow">

			<div class="card-header bg-dark text-white d-flex align-items-center">

				<div class="col-2"></div>


				<h1 class="h4 mb-0 flex-grow-1 text-center">LISTA DE CONDUCTORES</h1>


				<div class="col-2 text-end">

					<a href="formDriver.html" th:href="@{/nuevoDriver}" class="btn btn-success btn-sm">Agregar Conductor</a>

				</div>

			</div>

		</div>


		<div class="card-body p-0">

			<div class="table-responsive">

				<table class="table table-hover table-striped mb-0">

					<thead class="table-secondary">

						<tr>

							<th class="ps-4 col-3">Nº Licencia</th>

							<th class="text-center col-6">Nombre Completo</th>

							<th class="text-end pe-5 col-3">Acciones</th>

						</tr>

					</thead>

					<tbody>

						<tr th:each="driver : ${driversList}">

							<td class="ps-4 align-items-center">

								<span class="text text-center fw-bold" th:text="${driver.licencia}">sin licencia</span>

							</td>

							<td class="ps-4 align-items-center text-center">

								<span class="text text-center fw-bold" th:text="${driver.nombre}">sin nombre</span>

							</td>

							<td class="text-end pe-4">

								<div class="d-inline-flex gap-2">

									

									<a th:href="@{/editarConductor/{licencia}(licencia=${driver.licencia})}"

										class="btn btn-sm btn-outline-primary rounded-3 small">

										<i class="bi bi-pencil small"></i> Editar

									</a>

					

									<a th:href="@{/borrarConductor/{licencia}(licencia=${driver.licencia})}"

										class="btn btn-sm btn-outline-danger rounded-3 small">

										<i class="bi bi-eraser small"></i> Borrar

									</a>

								</div>

							</td>

						</tr>

					</tbody>

				</table>

			</div>

		</div>

	</div>


	<div th:replace="~{fragments/footer :: footer}"></div>

</body>


</html>
