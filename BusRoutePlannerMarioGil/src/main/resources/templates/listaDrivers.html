<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Lista de Conductores - Urban Bus</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="js/validator.js" defer></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/header :: cabecera}"></div>

	<div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black" style="min-height: 100%;">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto">
				<div class="col-12 col-xl-10 card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden px-0">
					
					<div class="card-header bg-dark border-secondary p-3">
						<div class="row align-items-center g-3">
							
							<div class="col-md-3 d-none d-md-block"></div>
							
							<div class="col-12 col-md-6 text-center">
								<h1 class="h4 mb-0 fw-bold text-white text-uppercase tracking-wide">LISTA DE CONDUCTORES</h1>
							</div>
							
							<div class="col-12 col-md-3 text-center text-md-end">
								<a th:href="@{/driver/nuevoDriver}" class="btn btn-warning text-dark btn-sm fw-bold px-3 py-2 d-inline-flex align-items-center gap-2 shadow-sm">
									<i class="bi bi-plus-lg"></i> Agregar Conductor
								</a>
							</div>
							
						</div>
					</div>

					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-dark table-hover align-middle mb-0">
								<thead class="table-group-divider text-uppercase small text-warning">
									<tr>
										<th class="py-3 ps-4 text-center w-25 fw-bold text-warning">Estado</th>
										<th class="py-3 text-start w-25 fw-bold text-warning">Nº Licencia</th>
										<th class="py-3 text-start w-25 fw-bold text-warning">Nombre Operador</th>
										<th class="py-3 text-end pe-4 w-25 fw-bold text-warning">Acciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#lists.isEmpty(driversList)}">
										<td colspan="4" class="text-center py-5 text-muted">
											<i class="bi bi-person-x d-block mb-2 text-warning fs-1"></i>
											<span class="fw-bold d-block text-white">No hay conductores registrados</span>
											<small class="text-secondary">Crea un nuevo conductor para rellenar la plantilla.</small>
										</td>
									</tr>
									<tr th:each="driver : ${driversList}">
										<td class="py-3 ps-4 text-center">
											<span th:if="${driver.estado}" class="badge bg-success bg-opacity-75 border border-success text-white px-3 py-2 rounded-pill shadow-sm">
												<i class="bi bi-check-circle-fill me-1"></i> Activo
											</span>
											<span th:if="${!driver.estado}" class="badge bg-danger bg-opacity-75 border border-danger text-white px-3 py-2 rounded-pill shadow-sm">
												<i class="bi bi-x-circle-fill me-1"></i> Inactivo
											</span>
										</td>
										<td class="py-3 text-start">
											<span class="badge bg-dark text-warning border border-secondary px-3 py-2 rounded-2 font-monospace fs-6" th:text="${driver.licencia}">000000</span>
										</td>
										<td class="py-3 text-start">
											<div class="ps-3 fw-bold text-white fs-5" th:text="${driver.nombre}">Nombre y Apellidos</div>
										</td>
										<td class="py-3 text-end pe-4">
											<div class="d-inline-flex gap-2">
												<a th:href="@{/driver/editar/{licencia}(licencia=${driver.licencia})}" class="btn btn-sm btn-outline-warning d-inline-flex align-items-center gap-1 rounded-2" title="Editar perfil">
													<i class="bi bi-pencil"></i> <span class="d-none d-md-inline">Editar</span>
												</a>
												<a th:href="@{/driver/borrar/{licencia}(licencia=${driver.licencia})}" class="btn btn-sm btn-outline-danger rounded-3 small">
													<i class="bi bi-eraser small"></i> Borrar
												</a>
											</div>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>

		</main>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
