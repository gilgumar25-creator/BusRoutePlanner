<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Listado de alumnos con fechas</title>
	<link rel="stylesheet" href="../static/css/main.css" th:href="@{/css/main.css}" />
</head>

<body>
	<a href="#" th:href="@{/newRuta}">Insertar una nueva Ruta</a>
	<br /><br />
	<table>
		<thead>
			<tr>
				<th>Código</th>
				<th>Origen</th>
				<th>Destino</th>
				<th>NumeroMáximoBusesSimultáneos</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="route : ${listaRutas}">
				<td th:text="${route.codigo}">Código</td>
				<td th:text="${route.origen}">Origen</td>
				<td th:text="${route.destino}">Destino</td>
				<td th:text="${route.numeromaximobusessimultaneos}">NúmeroMáximoBusesSimultáneos</td>
			</tr>
		</tbody>
	</table>
</body>

</html>
