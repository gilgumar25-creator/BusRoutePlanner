<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Buses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
	<div th:replace="~{fragments/header :: cabecera}"></div> 
    <div class="container-fluid mt-5">
        <div class="card shadow">
			<div class="card-header bg-dark text-white d-flex align-items-center">
			    <div class="col-2"></div>

			    <h1 class="h4 mb-0 flex-grow-1 text-center">LISTA DE BUSES</h1>

			    <div class="col-2 text-end">
			        <button class="btn btn-success btn-sm">Añadir</button>
			    </div>
			</div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-secondary">
                            <tr>
                                <th class="ps-4 col-4">Matrícula</th>
                                <th class="text-center col-4">Capacidad</th>
                                <th class="text-end pe-5 col-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="bus : ${busList}">
                                <td class="ps-4 align-itself">
                                    <span class="text text-center fw-bold" th:text="${bus.matricula}">sin matrícula</span>
                                </td>
                                <td class="text-center align-itself" th:text="${bus.capacidad + ' pasajeros'}">sin límite</td>
                                <td class="text-end pe-4">
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
									<button class="btn btn-sm btn-outline-danger">Eliminar</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
					
					
                </div>
            </div>
        </div>
    </div>
	<div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
