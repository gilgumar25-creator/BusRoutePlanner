<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Lista de Autobuses</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="https://jsdelivr.net">
	<script src="js/validator.js" defer></script>
</head>

<body class="bg-light">
	<div th:replace="~{fragments/header :: cabecera}"></div>
	<div class="container-fluid mt-5">
		<div class="card shadow">
			<div class="card-header bg-dark text-white d-flex align-items-center">
				<div class="col-2"></div>

				<h1 class="h4 mb-0 flex-grow-1 text-center">LISTA DE AUTOBUSES</h1>

				<div class="col-2 text-end">
					<a href="formBus.html" th:href="@{/nuevoBus}" class="btn btn-success btn-sm">Agregar Autobús</a>
				</div>
			</div>
		</div>
		<div class="card-body p-0">
			<div class="table-responsive">
				<table class="table table-hover table-striped mb-0">
					<thead class="table-secondary">
						<tr>
							<th class="ps-4 col-4">Matrícula</th>
							<th class="text-center col-4">Capacidad (Pasajeros)</th>
							<th class="text-end pe-5 col-4">Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="bus : ${busesList}">
							<td class="ps-4 align-middle">
								<span class="text text-center fw-bold" th:text="${bus.matricula}">sin matrícula</span>
							</td>
							<td class="ps-4 align-middle text-center">
								<span class="text text-center fw-bold" th:text="${bus.capacidad}">sin capacidad</span>
							</td>
							<td class="text-end pe-4 align-middle">
								<div class="d-inline-flex gap-2 align-items-center">
						
									<a th:href="@{/editarBus/{matricula}(matricula=${bus.matricula})}"
										class="btn btn-sm btn-outline-primary rounded-3 d-inline-flex align-items-center">
										<i class="bi bi-pencil fs-6 me-1"></i> Editar
									</a>
						
									<a th:href="@{/borrarBus/{matricula}(matricula=${bus.matricula})}"
										class="btn btn-sm btn-outline-danger rounded-3 d-inline-flex align-items-center">
										<i class="bi bi-eraser fs-6 me-1"></i> Borrar
									</a>
						
								</div>
							</td>
						</tr>
					</tbody>
				</table>

			</div>
		</div>
	</div>
	<div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
