<header th:fragment="cabecera">

			</a>

			<button class="navbar-toggler border-0 text-warning" type="button" data-bs-toggle="collapse" data-bs-target="#navUrbanBus" aria-controls="navUrbanBus" aria-expanded="false" aria-label="Toggle navigation">
				<i class="bi bi-grid-3x3-gap-fill fs-2"></i>
			</button>

			<div class="collapse navbar-collapse" id="navUrbanBus">
				
				<ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2 pe-4">
					<li class="nav-item">
						<a class="nav-link text-white px-3 py-2 rounded-2 d-flex align-items-center gap-2 small text-uppercase tracking-wider fw-bold" th:href="@{/}">

						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link text-white px-3 py-2 rounded-2 d-flex align-items-center gap-2 small text-uppercase tracking-wider fw-bold" th:href="@{/listaRutas}">

					</li>

						</a>
					</li>

						<button class="btn text-secondary position-absolute end-0 top-50 translate-middle-y me-1 border-0" type="submit">
							<i class="bi bi-search text-warning"></i>
