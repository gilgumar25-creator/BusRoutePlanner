<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Datos Financieros</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/header :: cabecera}"></div>

	<div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto g-4">
				
				<div class="col-12 col-xl-10 px-0 row g-4 mx-auto mb-2">
					
					<div class="col-12 col-md-6 ps-0 pe-0 pe-md-3">
						<div class="card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden h-100">
							<div class="card-body text-center p-4">
								<span class="text-uppercase text-warning fw-bold tracking-wide d-block mb-2">
									<i class="bi bi-coin me-2"></i>Total Recaudado Global
								</span>
								<h2 class="display-5 fw-bold text-white mb-2" 
									th:text="${#numbers.formatDecimal(gananciaTotal, 1, 'COMMA', 2, 'POINT') + '€'}">
									0.00€
								</h2>
							</div>
						</div>
					</div>

					<div class="col-12 col-md-6 pe-0 ps-0 ps-md-3">
						<div class="card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden h-100">
							<div class="card-body text-center p-4">
								<span class="text-uppercase text-warning fw-bold tracking-wide d-block mb-2">
									<i class="bi bi-calculator me-2"></i>Media de Coste por Km
								</span>
								<h2 class="display-5 fw-bold text-white mb-2" 
									th:text="${#numbers.formatDecimal(mediaRatioKm, 1, 'COMMA', 2, 'POINT') + ' €/Km'}">
									0.00 €/Km
								</h2>
							</div>
						</div>
					</div>

				</div>

				<div class="col-12 col-xl-10 card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden px-0">
					<div class="card-header bg-dark border-secondary p-3 text-center">
						<h2 class="h5 mb-0 fw-bold text-white text-uppercase tracking-wide">
							<i class="bi bi-signpost-split text-warning me-2"></i>Ingresos por Ruta
						</h2>
					</div>
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-dark table-hover align-middle mb-0 text-center">
								<thead class="table-group-divider text-uppercase small text-warning">
									<tr>
										<th class="py-3 ps-5 text-start fw-bold text-warning col-4">Código</th>
										<th class="py-3 pe-5 text-end fw-bold text-warning col-8">Total Estimado</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#maps.isEmpty(gananciasPorRuta)}">
										<td colspan="2" class="text-center py-5 text-muted">
											<i class="bi bi-exclamation-triangle d-block mb-2 text-warning fs-2"></i>
											No se registran datos de rutas activos.
										</td>
									</tr>
									<tr th:unless="${#maps.isEmpty(gananciasPorRuta)}" th:each="entry : ${gananciasPorRuta}">
										<td class="py-3 ps-5 text-start text-white fw-bold fs-4" th:text="${entry.key}">
											101
										</td>
										<td class="py-3 pe-5 text-end text-warning fw-bold fs-4" 
											th:text="${#numbers.formatDecimal(entry.value, 1, 'COMMA', 2, 'POINT') + '€'}">
											0.00€
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>

			</div>

		</main>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
