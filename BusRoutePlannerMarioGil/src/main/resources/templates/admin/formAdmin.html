<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Administrador - UrbanBus</title>
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/header :: cabecera}"></div>

    <div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black" style="min-height: 100%;">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto">
				<div class="col-md-7 card shadow rounded-3 border-0 px-0 text-dark">
                    
                    <div class="card-header bg-dark text-white p-3 text-center">
                        <h3 class="mb-0 fs-5 fw-bold d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-shield-lock-fill text-warning"></i>
                            <span th:text="${usuario.id != null} ? 'EDITAR ADMINISTRADOR' : 'NUEVO ADMINISTRADOR'">REGISTRO</span>
                        </h3>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/admin/guardarUsuario}" method="post">
                            
                            <input type="hidden" name="id" th:value="${usuario.id}" />

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="nombre" class="form-label fw-bold">Nombre de Usuario</label>
                                    <input type="text" class="form-control" id="nombre" name="nombre" th:value="${usuario.nombre}" required placeholder="Ej: mario.gil">
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="password" class="form-label fw-bold">Contraseña</label>
                                    <input type="password" class="form-control" id="password" name="password" 
                                           th:value="${usuario.password != null ? #strings.replace(usuario.password, '{noop}', '') : ''}" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="rol" class="form-label fw-bold">Rol en el Sistema</label>
                                    <select id="rol" class="form-select" name="rol" required>
                                        <option value="ADMIN" selected>ADMIN</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="fechaNombramiento" class="form-label fw-bold">Fecha de Nombramiento</label>
                                    <input type="date" class="form-control" id="fechaNombramiento" name="fechaNombramiento" 
                                           th:value="${usuario.fechaNombramiento}" required>
                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                                <a th:href="@{/admin/listaUsuarios}" class="btn btn-light border">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                    <i class="bi bi-check-circle me-1"></i> Guardar Cambios
                                </button>
                            </div>

                        </form>
                    </div>

                </div> 
            </div>
        </div>
    </main>
</div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
