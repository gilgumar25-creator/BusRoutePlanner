<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Lista de Usuarios - Urban Bus</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-dark text-light">

	<div th:replace="~{fragments/header :: cabecera}"></div>

	<div class="container mt-5 mb-5">

		<div class="card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden">

			<div class="card-header bg-dark border-secondary p-3">
				<div class="row align-items-center">
					<div class="col-4"></div>
					<div class="col-4 text-center">
						<h1 class="h4 mb-0 fw-bold text-white text-uppercase">Lista de Usuarios</h1>
					</div>
					<div class="col-4 text-end">
						<a th:href="@{/admin/nuevoUsuario}"
							class="btn btn-warning text-dark fw-bold px-3 py-2 d-inline-flex align-items-center gap-2 shadow-sm">
							<i class="bi bi-person-plus-fill"></i> Agregar Usuario
						</a>
					</div>
				</div>
			</div>

			<div class="card-body p-0">
				<div class="table-responsive">

					<table class="table table-dark table-hover align-middle mb-0 text-center">

						<thead class="table-group-divider text-uppercase small text-warning">
							<tr>
								<th class="py-3 ps-4 fw-bold text-warning col-1">ID</th>
								<th class="py-3 text-start fw-bold text-warning col-3">Nombre de Usuario</th>
								<th class="py-3 text-center fw-bold text-warning col-3">Rol del Sistema</th>
								<th class="py-3 text-center fw-bold text-warning col-3">Detalles del Cargo</th>
								<th class="py-3 text-end pe-4 fw-bold text-warning col-2">Contraseña</th>
							</tr>
						</thead>

						<tbody>

							<tr th:if="${#lists.isEmpty(userList)}">
								<td colspan="5" class="text-center py-5 text-muted">
									<i class="bi bi-person-x d-block mb-2 text-warning fs-1"></i>
									<span class="fw-bold d-block text-white">No hay usuarios registrados</span>
								</td>
							</tr>

							<tr th:unless="${#lists.isEmpty(userList)}" th:each="usuario : ${userList}">

								<td class="py-3 ps-4 text-center">
									<span
										class="badge bg-dark text-warning border border-warning px-3 py-2 rounded-2 font-monospace fs-6"
										th:text="${usuario.id}">
										1
									</span>
								</td>

								<td class="py-3 text-start text-white fw-bold fs-5" th:text="${usuario.nombre}">
									Mario
								</td>

								<td class="py-3 text-center">
									<span th:if="${usuario.rol != null and usuario.rol.name() == 'ADMIN'}"
										th:text="${usuario.rol.name()}"
										class="badge bg-danger bg-opacity-10 text-danger border border-danger px-3 py-2 rounded-2 fs-6 text-uppercase">
										ADMIN
									</span>

									<span th:if="${usuario.rol != null and usuario.rol.name() != 'ADMIN'}"
										th:text="${usuario.rol.name()}"
										class="badge bg-success bg-opacity-10 text-success border border-success px-3 py-2 rounded-2 fs-6 text-uppercase">
										OPERADOR
									</span>

									<span th:if="${usuario.rol == null}"
										class="badge bg-dark border border-secondary text-secondary px-3 py-2 rounded-2 fs-6">
										SIN ROL
									</span>
								</td>

								<td class="py-3 text-center">
									<div th:if="${usuario.rol != null and usuario.rol.name() == 'ADMIN'}">
										<span class="text-white-50 font-monospace fs-6">
											<i class="bi bi-calendar-check me-1 text-warning"></i>
											Alta: <span th:text="${usuario.fechaNombramiento}">2026-05-28</span>
										</span>
									</div>

									<div th:if="${usuario.rol != null and usuario.rol.name() != 'ADMIN'}">
										<span th:if="${usuario.activo}"
											class="badge bg-success text-white px-2 py-1 rounded fs-6">
											<i class="bi bi-circle-fill me-1 small"></i> ACTIVO
										</span>
										<span th:unless="${usuario.activo}"
											class="badge bg-danger text-white px-2 py-1 rounded fs-6">
											<i class="bi bi-circle-fill me-1 small"></i> INACTIVO
										</span>
									</div>
								</td>

								<td class="py-3 text-end pe-4">
									<span
										class="badge bg-dark text-warning border border-warning px-3 py-2 rounded-2 fs-6 font-monospace"
										th:text="${usuario.password}">
										Mario
									</span>
								</td>

							</tr>
						</tbody>
					</table>

				</div>
			</div>
		</div>
	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
