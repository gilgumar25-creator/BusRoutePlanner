<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Nuevo Usuario - Bus Route Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link class="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/header :: cabecera}"></div>

    <div class="d-flex flex-column flex-grow-1 container-fluid px-0 pt-5 pb-5 pt-md-4 pb-md-4">

		<main class="flex-grow-1 d-flex flex-column p-3 p-md-5 text-light overflow-auto mt-5 bg-black" style="min-height: 100%;">

			<div class="container-fluid mb-5 mt-md-4 row justify-content-center mx-auto">
				<div class="col-md-6 card shadow border-secondary bg-secondary bg-opacity-10 rounded-3 overflow-hidden px-0">
                    
                    <div class="card-header bg-dark border-secondary p-4 text-center">
                        <h3 class="mb-0 fw-bold text-warning text-uppercase">
                            <i class="bi bi-person-plus-fill me-2"></i>Nuevo Usuario
                        </h3>
                    </div>
                    
                    <div class="card-body p-4">
                        <form th:action="@{/admin/guardarUsuario}" method="post">
                            
                            <div class="mb-3">
                                <label for="nombre" class="form-label text-warning small text-uppercase fw-bold">Nombre de Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
                                    <input type="text" id="nombre" name="nombre" class="form-control bg-dark border-secondary text-white" 
                                           placeholder="Ej: mario.gil" required autocomplete="username">
                                </div>
                                <div class="form-text text-secondary mt-1">Este nombre actuará como identificador único en el sistema.</div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label text-warning small text-uppercase fw-bold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="password" name="password" class="form-control bg-dark border-secondary text-white" 
                                           placeholder="Introduce la contraseña" required autocomplete="new-password">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="rol" class="form-label text-warning small text-uppercase fw-bold">Rol del Sistema</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-shield-lock"></i></span>
                                    <select id="rol" name="rol" class="form-select bg-dark border-secondary text-white" style="cursor: pointer;" required>
                                        <option value="" disabled selected class="bg-dark">-- Selecciona un rol --</option>
                                        <option th:each="unRol : ${T(com.salesianostriana.dam.busrouteplannermariogil.entity.Rol).values()}"
                                                th:value="${unRol}" 
                                                th:text="${unRol.name()}"
                                                class="bg-dark">
                                            ADMIN
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <hr class="border-secondary my-4">

                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <a th:href="@{/admin/listaUsuarios}" class="btn btn-outline-secondary px-3">
                                    <i class="bi bi-arrow-left-short"></i> Cancelar y Volver
                                </a>
                                <button type="submit" class="btn btn-warning text-dark fw-bold px-4 shadow-sm">
                                    <i class="bi bi-check-circle-fill me-1"></i> Guardar Usuario
                                </button>
                            </div>

                        </form>
                    </div>
                    
                </div>
            </div>
        </div>
    </main>
</div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
