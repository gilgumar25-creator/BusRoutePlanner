<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario de Ruta - Urban Bus</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/calculoPrecio.js}" defer></script>
</head>

<body class="bg-light">

	<div th:replace="~{fragments/header :: cabecera}"></div>

	<div class="container mt-5 mb-5">
		<div class="row justify-content-center">
			<div class="col-md-7">
				<div class="card shadow rounded-3 border-0">

					<div class="card-header bg-dark text-white p-3 text-center">
						<h3 class="mb-0 fs-5 fw-bold d-flex align-items-center justify-content-center gap-2">
							<i class="bi bi-map-fill text-warning"></i>
							<span th:text="${route.codigo != null} ? 'EDITAR RUTA' : 'NUEVA RUTA'">REGISTRO</span>
						</h3>
					</div>

					<div class="card-body p-4">
						<form th:action="@{/guardarRuta/submit}" th:object="${route}" method="POST">

							<div class="mb-4">
								<label for="codigo" class="form-label fw-bold">Código Ruta (Solo números)</label>
								<input type="text" inputmode="numeric" pattern="[0-9]*" id="codigo" th:field="*{codigo}"
									placeholder="Ej: 101" th:readonly="${route.codigo != null}" 
									class="form-control"
									th:classappend="${#fields.hasErrors('codigo')} ? 'is-invalid' : ''" />
								<div th:replace="~{fragments/errors :: fieldError(campo='codigo')}"></div>
							</div>

							<div class="row">
								<div class="col-md-6 mb-4">
									<label for="origen" class="form-label fw-bold">Origen</label>
									<select id="origen" th:field="*{origen}" 
										class="form-select"
										th:classappend="${#fields.hasErrors('origen')} ? 'is-invalid' : ''">
										<option value="" selected disabled hidden>Selecciona origen...</option>
										<option value="Sevilla (Capital)">Sevilla (Capital)</option>
										<option value="Dos Hermanas">Dos Hermanas</option>
										<option value="Alcalá de Guadaíra">Alcalá de Guadaíra</option>
										<option value="Utrera">Utrera</option>
										<option value="Mairena del Aljarafe">Mairena del Aljarafe</option>
										<option value="Palomares del Rio">Palomares del Río</option>
										<option value="La Rinconada">La Rinconada</option>
									</select>
									<div th:replace="~{fragments/errors :: fieldError(campo='origen')}"></div>
								</div>

								<div class="col-md-6 mb-4">
									<label for="destino" class="form-label fw-bold">Destino</label>
									<select id="destino" th:field="*{destino}" 
										class="form-select"
										th:classappend="${#fields.hasErrors('destino')} ? 'is-invalid' : ''">
										<option value="" selected disabled hidden>Selecciona destino...</option>
										<option value="Sevilla (Capital)">Sevilla (Capital)</option>
										<option value="Dos Hermanas">Dos Hermanas</option>
										<option value="Alcalá de Guadaíra">Alcalá de Guadaíra</option>
										<option value="Utrera">Utrera</option>
										<option value="Mairena del Aljarafe">Mairena del Aljarafe</option>
										<option value="Écija">Écija</option>
										<option value="La Rinconada">La Rinconada</option>
									</select>
									<div th:replace="~{fragments/errors :: fieldError(campo='destino')}"></div>
								</div>
							</div>

							<hr class="my-3">

							<div class="row">
								<div class="col-md-6 mb-4">
									<label for="distancia" class="form-label fw-bold">Distancia (KM)</label>
									<input type="number" step="0.01" min="0" id="distancia" th:field="*{distancia}"
										class="form-control" placeholder="0.00" 
										th:classappend="${#fields.hasErrors('distancia')} ? 'is-invalid' : ''" />
									<div th:replace="~{fragments/errors :: fieldError(campo='distancia')}"></div>
								</div>

								<div class="col-md-6 mb-4">
									<label for="preciokilometro" class="form-label fw-bold">Precio por KM (€)</label>
									<input type="number" step="0.01" min="0" id="preciokilometro" th:field="*{preciokilometro}" 
										class="form-control" placeholder="0.00" 
										th:classappend="${#fields.hasErrors('preciokilometro')} ? 'is-invalid' : ''" />
									<div th:replace="~{fragments/errors :: fieldError(campo='preciokilometro')}"></div>
								</div>
							</div>

							<div class="mb-4">
								<label for="precioViaje" class="form-label fw-bold">Precio Total del Viaje (€)</label>
								<input type="number" step="0.01" id="precioViaje" th:field="*{precioViaje}"
									class="form-control bg-light fw-bold text-secondary" placeholder="0.00"
									readonly />
							</div>

							<div class="mb-4">
								<label for="buses" class="form-label fw-bold">Nº Máximo de Buses Simultáneos</label>
								<input type="number" min="1" id="buses" th:field="*{numeroMaximoBusesSimultaneos}"
									class="form-control" placeholder="1" 
									th:classappend="${#fields.hasErrors('numeroMaximoBusesSimultaneos')} ? 'is-invalid' : ''" />
								<div th:replace="~{fragments/errors :: fieldError(campo='numeroMaximoBusesSimultaneos')}"></div>
							</div>

							<div class="mt-4 pt-3 border-top d-flex justify-content-between">
								<a th:href="@{/listaRutas}" class="btn btn-light border">Cancelar</a>
								<button type="submit" class="btn btn-primary px-4 shadow-sm">
									<i class="bi bi-check-circle me-1"></i> Guardar Ruta
								</button>
							</div>

						</form>
					</div>

				</div>
			</div>
		</div>
	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
