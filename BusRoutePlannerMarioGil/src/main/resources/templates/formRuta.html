<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Añadir Nueva Ruta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body class="bg-light">

    <div class="container min-vh-100 d-flex justify-content-center align-items-center py-5">
        <div class="col-10 col-sm-8 col-md-6 col-lg-5">
            
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                
                <div class="card-header bg-dark text-white py-4 border-0">
                    <div class="d-flex align-items-center justify-content-center gap-2">
                        <h2 class="h5 fw-bold mb-0 text-uppercase tracking-wider">Nueva Ruta de Autobús</h2>
                        <i class="bi bi-bus-front text-success fs-4"></i>
                    </div>
                </div>
                
                <div class="card-body p-4 bg-white">
                    <form th:action="@{/guardarRuta/submit}" th:object="${route}" method="POST">
						


						<div class="form-floating mb-3">
						    <input type="text" 
						           inputmode="numeric" 
						           pattern="[0-9]*" 
						           id="codigo" 
						           th:field="*{codigo}" 
						           class="form-control rounded-3" 
						           placeholder="Código" 
						           required />
						    <label for="codigo" class="text-secondary">Código Ruta (Solo números<span class="">, no modificable</span>)</label>
							
						</div>
                        
                        <div class="row g-2 mb-3">
                            <div class="col-sm-6">
                                <div class="form-floating">
                                    <select id="origen" th:field="*{origen}" class="form-select rounded-3" required>
                                        <option value="" selected disabled>Selecciona...</option>
                                        <option value="Sevilla (Capital)">Sevilla (Capital)</option>
                                        <option value="Dos Hermanas">Dos Hermanas</option>
                                        <option value="Alcalá de Guadaíra">Alcalá de Guadaíra</option>
                                        <option value="Utrera">Utrera</option>
                                        <option value="Mairena del Aljarafe">Mairena del Aljarafe</option>
                                        <option value="Palomares del Rio">Palomares del Río</option>
                                        <option value="La Rinconada">La Rinconada</option>
                                    </select>
                                    <label for="origen" class="text-secondary">Origen</label>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="form-floating">
                                    <select id="destino" th:field="*{destino}" class="form-select rounded-3" required>
                                        <option value="" selected disabled>Selecciona...</option>
                                        <option value="Sevilla (Capital)">Sevilla (Capital)</option>
                                        <option value="Dos Hermanas">Dos Hermanas</option>
                                        <option value="Alcalá de Guadaíra">Alcalá de Guadaíra</option>
                                        <option value="Utrera">Utrera</option>
                                        <option value="Mairena del Aljarafe">Mairena del Aljarafe</option>
                                        <option value="Écija">Écija</option>
                                        <option value="La Rinconada">La Rinconada</option>
                                    </select>
                                    <label for="destino" class="text-secondary">Destino</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-floating mb-4">
                            <input type="number" min="1" id="buses" th:field="*{numeroMaximoBusesSimultaneos}" class="form-control rounded-3" placeholder="1" required />
                            <label for="buses" class="text-secondary">Nº Máximo de Buses Simultáneos</label>
                        </div>
                        
                        <div class="d-grid gap-2">
							<button type="submit" class="btn btn-success py-2.5 fw-bold rounded-3 shadow-sm">
                                <i class="bi bi-check-circle me-2"></i>Guardar Ruta
                            </button>
							
                            <a th:href="@{/listaRutas}" class="btn btn-outline-danger py-2.5 rounded-3">
                                <i class="bi bi-arrow-left me-2"></i>Cancelar
                            </a>
                        </div>
                        
                    </form>
                </div>
                
            </div>
            
        </div>
    </div>
</body>

</html>
